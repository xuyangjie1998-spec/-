name: Build Windows EXE

on:
  push:
    branches: [master, main]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: 编译 EXE
        run: |
          python -m PyInstaller build.spec --noconfirm

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: San7ModMaker-win64
          path: dist/San7ModMaker.exe

      - name: 发布到 Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/San7ModMaker.exe"
          tag: latest
          name: "San7ModMaker 最新构建"
          body: |
            **自动构建** — 基于提交 [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            
            **提交信息**: ${{ github.event.head_commit.message }}
            
            **构建时间**: ${{ github.event.head_commit.timestamp }}
            
            > 下载下方 `San7ModMaker.exe` 即可使用。
          makeLatest: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true